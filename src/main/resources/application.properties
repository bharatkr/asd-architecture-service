spring.application.name=asd-architecture-service
server.port=8015

# Shallow clone depth (1 = fastest; increase if you need full history)
asd.clone-depth=1

# Max files to scan for inventory (safety)
asd.scan-max-files=8000

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
